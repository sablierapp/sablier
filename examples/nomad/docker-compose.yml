version: '3.8'

services:
  # Nomad - Job orchestrator in dev mode
  nomad:
    image: hashicorp/nomad:1.8
    container_name: nomad
    command: agent -dev -bind=0.0.0.0
    ports:
      - "4646:4646"  # HTTP API and UI
    volumes:
      - ./jobs:/nomad/jobs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sablier-network
    environment:
      - NOMAD_ADDR=http://localhost:4646
    restart: unless-stopped
    privileged: true

networks:
  sablier-network:
    driver: bridge
