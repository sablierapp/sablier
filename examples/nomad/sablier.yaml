provider:
  name: nomad
  nomad:
    address: http://nomad:4646
    namespace: default

server:
  port: 10000
  base-path: /

sessions:
  default-duration: 1m  # Short duration for testing
  expiration-interval: 10s

logging:
  level: debug

strategy:
  dynamic:
    display-name: "Nomad Example"
    show-details-by-default: true
    default-theme: hacker-terminal
    default-refresh-frequency: 5s
  blocking:
    default-timeout: 1m
    default-refresh-frequency: 1s
