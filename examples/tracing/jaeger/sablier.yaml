provider:
  name: docker
server:
  port: 10000
  base-path: /
sessions:
  default-duration: 1m
  expiration-interval: 5s
logging:
  level: info
strategy:
  blocking:
    default-timeout: 30s
    default-refresh-frequency: 1s
tracing:
  enabled: true
  exporterType: otlphttp
  endpoint: http://jaeger:4318
  serviceName: sablier
  samplingRate: 1.0
