services:
  sablier:
    image: ${SABLIER_IMAGE:-sablierapp/sablier:latest}
    command:
      - --configFile=/etc/sablier/sablier.yaml
      - start
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sablier.yaml:/etc/sablier/sablier.yaml:ro
    ports:
      - "10000:10000"
    depends_on:
      jaeger:
        condition: service_healthy

  whoami:
    image: acouvreur/whoami:v1.10.2
    labels:
      - sablier.enable=true
      - sablier.group=demo

  # Jaeger all-in-one: receives OTLP over HTTP on port 4318 and exposes the
  # UI on port 16686. Traces are stored in memory (resets on restart).
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP (traces ingest)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
