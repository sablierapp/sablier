services:
  sablier:
    restart: always
    image: ${SABLIER_IMAGE:-sablierapp/sablier:latest}
    command:
      - start
      - --provider.name=docker
      - --provider.docker.honor-restart-policy=true
      - --logging.level=debug
      - --sessions.default-duration=2m
      - --sessions.expiration-interval=10s
      - --strategy.blocking.default-timeout=2m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "10000:10000"

  # db is a dependency of `app`. It carries the same sablier.group as `app`
  # AND sablier.enable=true, so Sablier both *starts* it (to satisfy the
  # depends_on relationship) and *stops* it together with the rest of the
  # group when the session expires. Sablier waits for it to become healthy
  # before starting the containers that depend on it.
  db:
    restart: unless-stopped
    image: sablierapp/mimic:v0.3.3
    command:
      - -running-after=2s
      - -healthy=true
      - -healthy-after=2s
    labels:
      - "sablier.enable=true"
      - "sablier.group=app"
    healthcheck:
      test: ["CMD", "/mimic", "healthcheck"]
      interval: 1s
      timeout: 3s
      retries: 10

  # migration is a one-shot init container. It runs once, exits successfully
  # and is never restarted (restart: "no"). With
  # --provider.docker.honor-restart-policy=true, Sablier reports a container
  # that exited with code 0 under a non-restarting policy as "completed",
  # which lets `service_completed_successfully` dependencies resolve. Without
  # that flag, Sablier keeps its historical behavior and reports the exited
  # container as "stopped".
  #
  # NOTE: migration is intentionally NOT labeled with sablier.enable / sablier.group.
  # It is a one-shot job, not a long-running service, so there is nothing for
  # Sablier to "keep alive" or "scale to zero". Sablier starts it on demand only
  # because `app` declares a depends_on relationship on it. Labeling a one-shot
  # container and putting it in a blocking group would make the group never
  # become ready (the container exits by design and can never stay "running").
  # See https://github.com/sablierapp/sablier/issues/952
  migration:
    image: sablierapp/mimic:v0.3.3
    command:
      - -running=false
      - -exit-code=0
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  # app is the user-facing service. When a request comes in, Sablier first
  # resolves its compose `depends_on` graph: it starts `db` (waiting until
  # healthy) and `migration` (waiting until it has completed successfully)
  # before starting `app`.
  # See https://github.com/sablierapp/sablier/issues/792
  app:
    restart: unless-stopped
    image: sablierapp/mimic:v0.3.3
    command:
      - -running-after=1s
      - -healthy=true
      - -healthy-after=1s
    labels:
      - "sablier.enable=true"
      - "sablier.group=app"
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/mimic", "healthcheck"]
      interval: 1s
      timeout: 3s
      retries: 10
    ports:
      - "8080:80"
