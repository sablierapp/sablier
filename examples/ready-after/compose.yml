services:
  sablier:
    restart: always
    image: ${SABLIER_IMAGE:-sablierapp/sablier:latest}
    command:
      - start
      - --provider.name=docker
      - --logging.level=debug
      - --sessions.default-duration=2m
      - --sessions.expiration-interval=10s
      - --strategy.blocking.default-timeout=2m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "10000:10000"
    depends_on:
      - slow-starter

  # mimic is a configurable web-server used for testing purposes.
  # It becomes healthy after 5 s (-healthy-after=5s), but sablier.ready-after
  # adds a further 15 s settling period before Sablier unblocks requests,
  # demonstrating a service that passes its health check before it can fully
  # serve traffic.
  slow-starter:
    restart: unless-stopped
    image: sablierapp/mimic:v0.3.3
    command:
      - -running-after=5s
      - -healthy=true
      - -healthy-after=5s
    labels:
      - "sablier.enable=true"
      - "sablier.group=slow-starter"
      - "sablier.ready-after=15s"
    healthcheck:
      test: ["CMD", "/mimic", "healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 10
    ports:
      - "8080:80"
