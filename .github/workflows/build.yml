name: Build

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:

  build:
    name: Build
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'go.mod'
        cache-dependency-path: |
          go.sum
          tools.mod

    - name: Disable AppArmor on the GitHub runner
      uses: cisagov/action-disable-apparmor@437d94f26a2e4bf8c03acfb500a6afc688b497db # v1.0.0

    - name: Enable unprivileged user namespaces
      run: sudo sysctl -w kernel.unprivileged_userns_clone=1

    - name: Test
      id: test
      run: |
        set -o pipefail
        go test -tags="nomsgpack,remote,exclude_graphdriver_btrfs,containers_image_openpgp" -v -race -json -covermode atomic -coverprofile coverage.out ./... | tee test-report.json | go tool -modfile=tools.mod go-test-report

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
      if: ${{ !cancelled() }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.go.tests.reportPaths=test-report.json
          -Dsonar.go.coverage.reportPaths=coverage.out

    - name: Upload HTML Test report
      if: ${{ !cancelled() }}
      id: upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-test-report
        path: test_report.html
        compression-level: 0
        archive: false
        retention-days: 2

    - name: Find existing test results comment
      if: github.event_name == 'pull_request' && !cancelled()
      uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
      id: fc
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: Test Results

    - name: Create or update test results comment
      if: github.event_name == 'pull_request' && !cancelled()
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          ## Test Results
          ${{ steps.test.outcome == 'success' && '✅ All tests passed!' || '❌ Some tests failed' }}
          [View HTML Test Report](${{ steps.upload.outputs.artifact-url }})
        edit-mode: replace