name: Build

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: read

jobs:

  build:
    name: Build
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: 'go.mod'
        cache-dependency-path: |
          go.sum
          tools.mod

    - name: Verify generated docs are up to date
      run: make check-generate

    - name: Disable AppArmor on the GitHub runner
      uses: cisagov/action-disable-apparmor@437d94f26a2e4bf8c03acfb500a6afc688b497db # v1.0.0

    - name: Enable unprivileged user namespaces
      run: sudo sysctl -w kernel.unprivileged_userns_clone=1

    - name: Test
      id: test
      run: |
        # gotestsum reruns failing tests with --rerun-fails; when using
        # -coverprofile this can overwrite the full-suite profile with a
        # rerun-only profile. We write binary coverage with -test.gocoverdir
        # and merge it afterwards to keep stable aggregate coverage across reruns.
        # See: https://github.com/gotestyourself/gotestsum/issues/274
        mkdir -p /tmp/gocov
        go tool -modfile=tools.mod gotestsum \
          --jsonfile test-report.json \
          --format testname \
          --rerun-fails=3 \
          --rerun-fails-max-failures=10 \
          --packages="./..." \
          --post-run-command .github/scripts/test-summary.sh \
          -- -tags="nomsgpack" -race -covermode=atomic -cover ./... -args -test.gocoverdir=/tmp/gocov

    - name: Generate coverage report
      if: ${{ !cancelled() }}
      run: go tool covdata textfmt -i=/tmp/gocov -o=coverage.out

    - name: Generate HTML test report
      if: ${{ !cancelled() }}
      run: cat test-report.json | go tool -modfile=tools.mod go-test-report

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      # SONAR_TOKEN is not exposed to fork PRs, so the scan only runs for branches
      # pushed to this repo (pushes to main and same-repo PRs), never for forks.
      if: ${{ !cancelled() && github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.go.tests.reportPaths=test-report.json
          -Dsonar.go.coverage.reportPaths=coverage.out

    - name: Upload HTML Test report
      if: ${{ !cancelled() }}
      id: upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-test-report
        path: test_report.html
        compression-level: 0
        archive: false
        retention-days: 2

    - name: Find existing test results comment
      if: github.event_name == 'pull_request' && !cancelled() && github.event.pull_request.head.repo.full_name == github.repository
      uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
      id: fc
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: Test Results

    - name: Create or update test results comment
      if: github.event_name == 'pull_request' && !cancelled() && github.event.pull_request.head.repo.full_name == github.repository
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          ## Test Results
          ${{ steps.test.outcome == 'success' && '✅ All tests passed!' || '❌ Some tests failed' }} | ${{ steps.test.outputs.tests_total }} tests in ${{ steps.test.outputs.elapsed }}
          ${{ steps.test.outputs.has_flaky == 'true' && format('> ⚠️ {0} test(s) were flaky (failed then passed on rerun)', steps.test.outputs.flaky_count) || '' }}
          ${{ steps.test.outputs.flaky_names }}
          [View HTML Test Report](${{ steps.upload.outputs.artifact-url }})
        edit-mode: replace