name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    # Only run when the docs (or this workflow) change.
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  # Rebuild when a release is published so the new /vX.Y/ snapshot (and the
  # updated "latest" at the root) are picked up from the freshly created tag.
  release:
    types: [published]
  workflow_dispatch:

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    # Least privilege: the build job only reads the repository.
    permissions:
      contents: read
    env:
      HUGO_VERSION: 0.163.3
      HUGO_ENVIRONMENT: production
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget --https-only -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # needed for .Lastmod / .GitInfo and for build.sh to read every release tag
          fetch-tags: true # build.sh derives the versioned docs (/vX.Y/) from tags
      - name: Setup Go (required to fetch the Hextra Hugo module)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools.mod

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build with Hugo (multi-version)
        working-directory: docs
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        # build.sh builds the latest stable release at the root, main at /next/,
        # and every released minor at /vX.Y/ (BASE_URL defaults to the custom
        # domain https://sablierapp.dev). See docs/build.sh.
        run: ./build.sh
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/public

  deploy:
    # Least privilege: only the deploy job needs Pages write and the OIDC token.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
