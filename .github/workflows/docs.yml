name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    # Only run when the docs (or this workflow) change.
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
      HUGO_ENVIRONMENT: production
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for .Lastmod / .GitInfo
      - name: Setup Go (required to fetch the Hextra Hugo module)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        working-directory: docs
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        # baseURL is pinned to the custom domain (sablierapp.dev) in hugo.yaml,
        # so we intentionally do not override it here.
        run: hugo --gc --minify
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
