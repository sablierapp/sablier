name: Release with GoReleaser

on:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  goreleaser:
    permissions:
      contents: write
      packages: write
      issues: write
      id-token: write
      attestations: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: |
            go.sum
            tools.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: github.ref_type == 'tag'
        with:
          # Should use OIDC, but not yet supported by Docker Hub.
          # See https://github.com/docker/roadmap/issues/314 for more details.
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: github.ref_type == 'tag'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        id: goreleaser
        with:
          distribution: goreleaser
          args: release --clean ${{ github.ref_type != 'tag' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # After GoReleaser runs, attest all the files in ./dist/checksums.txt:
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: github.ref_type == 'tag'
        with:
          subject-checksums: ./dist/checksums.txt

      # After GoReleaser runs, attest all the images in ./dist/digests.txt:
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: github.ref_type == 'tag'
        with:
          subject-checksums: ./dist/digests.txt

      - name: Download latest released Sablier binary
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        id: latest-release
        run: |
          release_data=$(curl -s https://api.github.com/repos/sablierapp/sablier/releases/latest)
          artifact_url=$(echo $release_data | jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url')
          version=$(echo $release_data | jq -r '.tag_name')
          wget -q $artifact_url -O sablier_${version}_linux-amd64
          tar -xzf sablier_${version}_linux-amd64
          echo "artifact_path=sablier" >> $GITHUB_OUTPUT

      - name: Compare the downloaded binary with the built binary
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        id: diff
        run: |
          # Extract the built linux/amd64 artifact path from GoReleaser's artifacts.json
          built_path=$(jq -r '.[] | select(.goos=="linux" and .goarch=="amd64") | .path' ./dist/artifacts.json | head -n1)
          if [ -z "$built_path" ]; then
            echo "No linux/amd64 artifact found in ./dist/artifacts.json" >&2
            exit 1
          fi

          GOEXPERIMENT=jsonv2 go tool -modfile=tools.mod gsa -o diff.txt "${{ steps.latest-release.outputs.artifact_path }}" "$built_path"
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$(cat diff.txt)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment diff on pull request
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: |
            ```
            ${{ steps.diff.outputs.diff }}
            ```
          comment-tag: go-binary-diff