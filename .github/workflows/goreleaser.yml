name: Release with GoReleaser

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

# Isolate runs by ref: cancel superseded main/PR builds, but never a tag release.
concurrency:
  group: goreleaser-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  goreleaser:
    permissions:
      contents: write
      packages: write
      issues: write
      id-token: write
      attestations: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: |
            go.sum
            tools.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
        with:
          # Should use OIDC, but not yet supported by Docker Hub.
          # See https://github.com/docker/roadmap/issues/314 for more details.
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        id: goreleaser
        with:
          distribution: goreleaser
          # tag: full release. main: snapshot without docker (goreleaser OSS can't
          # push from a branch; we build the moving :next image below from the
          # binaries it produced). PR: snapshot, for build validation.
          args: ${{ github.ref_type == 'tag' && 'release --clean' || (github.ref == 'refs/heads/main' && 'release --clean --snapshot --skip=docker' || 'release --clean --snapshot') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish moving :next image from main
        if: github.ref == 'refs/heads/main'
        # GoReleaser OSS cannot publish from a branch (nightly is Pro-only,
        # snapshot never pushes), so we push :next here — but reuse the binaries
        # GoReleaser just built (same flags as releases) and the SAME
        # build/Dockerfile, assembling a multi-arch manifest. No separate
        # Dockerfile or build path.
        run: |
          set -euo pipefail
          ctx="$(mktemp -d)"
          # Lay the linux binaries out as $TARGETPLATFORM/sablier for build/Dockerfile.
          jq -r '.[] | select(.type=="Binary" and .goos=="linux") | [.path, .goarch, (.goarm // "")] | @tsv' dist/artifacts.json \
            | while IFS=$'\t' read -r path arch goarm; do
                case "$arch" in
                  amd64) plat=linux/amd64 ;;
                  arm64) plat=linux/arm64 ;;
                  arm) [ "$goarm" = "7" ] || continue; plat=linux/arm/v7 ;;
                  *) continue ;;
                esac
                install -D "$path" "$ctx/$plat/sablier"
              done
          docker buildx build --push \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            --file build/Dockerfile \
            --label "org.opencontainers.image.title=sablier" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=next" \
            --tag sablierapp/sablier:next \
            --tag ghcr.io/sablierapp/sablier:next \
            "$ctx"

      # After GoReleaser runs, attest all the files in ./dist/checksums.txt:
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: github.ref_type == 'tag'
        with:
          subject-checksums: ./dist/checksums.txt

      # After GoReleaser runs, attest all the images in ./dist/digests.txt:
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: github.ref_type == 'tag'
        with:
          subject-checksums: ./dist/digests.txt

      - name: Download latest released Sablier binary
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        id: latest-release
        run: |
          release_data=$(curl -s https://api.github.com/repos/sablierapp/sablier/releases/latest)
          artifact_url=$(echo $release_data | jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url')
          version=$(echo $release_data | jq -r '.tag_name')
          wget -q $artifact_url -O sablier_${version}_linux-amd64
          tar -xzf sablier_${version}_linux-amd64
          echo "artifact_path=sablier" >> $GITHUB_OUTPUT

      - name: Compare the downloaded binary with the built binary
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        id: diff
        run: |
          # Extract the built linux/amd64 artifact path from GoReleaser's artifacts.json
          built_path=$(jq -r '.[] | select(.goos=="linux" and .goarch=="amd64") | .path' ./dist/artifacts.json | head -n1)
          if [ -z "$built_path" ]; then
            echo "No linux/amd64 artifact found in ./dist/artifacts.json" >&2
            exit 1
          fi

          GOEXPERIMENT=jsonv2 go tool -modfile=tools.mod gsa -o diff.txt "${{ steps.latest-release.outputs.artifact_path }}" "$built_path"
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$(cat diff.txt)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment diff on pull request
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: |
            ```
            ${{ steps.diff.outputs.diff }}
            ```
          comment-tag: go-binary-diff