# Redirect map from the old docsify site to the new Hugo site.
#
# The old site used docsify HASH routing, so live URLs looked like
#   https://sablierapp.dev/#/providers/docker
# The "#/..." fragment is never sent to the server, so these can only be
# redirected in the browser. This file is the single source of truth consumed
# by the client-side shim in layouts/partials/custom/head-end.html.
#
# `from` is the old hash route (the part after the "#").
# `to`   is the canonical Hugo path on the new site.
redirects:
  - from: /getting-started
    to: /tutorials/getting-started/
  - from: /installation
    to: /tutorials/installation/
  - from: /configuration
    to: /tutorials/configuration/
  - from: /strategies
    to: /concepts/strategies/
  - from: /themes
    to: /how-to-guides/loading-strategies/customize-theme/
  - from: /webhooks
    to: /how-to-guides/webhooks/
  - from: /tracing
    to: /how-to-guides/advanced/observability/tracing/
  - from: /performance
    to: /reference/performance/
  - from: /resource-efficiency
    to: /concepts/resource-efficiency/
  - from: /health
    to: /reference/cli/
  - from: /versioning
    to: /reference/versioning/
  # Providers (the old "overview" page is now the section landing page)
  - from: /providers/overview
    to: /tutorials/providers/
  - from: /providers/docker
    to: /tutorials/providers/docker/
  - from: /providers/docker_swarm
    to: /tutorials/providers/docker_swarm/
  - from: /providers/kubernetes
    to: /tutorials/providers/kubernetes/
  - from: /providers/podman
    to: /tutorials/providers/podman/
  - from: /providers/proxmox_lxc
    to: /tutorials/providers/proxmox_lxc/
  # Reverse proxy plugins
  - from: /plugins/overview
    to: /tutorials/reverse-proxies/
  - from: /plugins/apacheapisix
    to: /tutorials/reverse-proxies/apacheapisix/
  - from: /plugins/caddy
    to: /tutorials/reverse-proxies/caddy/
  - from: /plugins/envoy
    to: /tutorials/reverse-proxies/envoy/
  - from: /plugins/istio
    to: /tutorials/reverse-proxies/istio/
  # Old NJS nginx link had no dedicated page; point at the closest match.
  - from: /plugins/nginx
    to: /tutorials/reverse-proxies/nginx_proxywasm/
  - from: /plugins/nginx_proxywasm
    to: /tutorials/reverse-proxies/nginx_proxywasm/
  - from: /plugins/traefik
    to: /tutorials/reverse-proxies/traefik/
  # Guides
  - from: /guides/overview
    to: /guides/
  - from: /guides/code-server-traefik-kubernetes
    to: /guides/code-server-traefik-kubernetes/
  # Feature sections that moved out of configuration.md into their own pages.
  # Keys include the old docsify "?id=" anchor and are matched exactly by the
  # redirect shim before the generic path lookup.
  - from: /configuration?id=multiple-groups-per-instance
    to: /how-to-guides/groups/
  - from: /configuration?id=sablierready-after
    to: /how-to-guides/readiness/ready-after/
  - from: /configuration?id=sablierready-on-start
    to: /how-to-guides/readiness/ready-on-start/
  - from: /configuration?id=sablierrunning-hours
    to: /how-to-guides/lifecycle/running-hours/
  - from: /configuration?id=sablierrunning-days
    to: /how-to-guides/lifecycle/running-hours/
  - from: /configuration?id=scale-mode
    to: /how-to-guides/scaling-resources/scale-mode/
  - from: /configuration?id=block-io-blkio-throttling
    to: /how-to-guides/scaling-resources/scale-blkio/
  - from: /configuration?id=anti-affinity
    to: /how-to-guides/anti-affinity/
