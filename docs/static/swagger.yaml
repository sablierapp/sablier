basePath: /
definitions:
  api.SessionResponse:
    properties:
      session:
        $ref: '#/definitions/sablier.SessionState'
    type: object
  api.ThemesResponse:
    properties:
      themes:
        items:
          type: string
        type: array
    type: object
  rfc7807.Problem:
    properties:
      detail:
        type: string
      instance:
        $ref: '#/definitions/url.URL'
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  sablier.BlkioThrottleDevice:
    properties:
      path:
        type: string
      rate:
        type: string
    type: object
  sablier.BlkioWeightDevice:
    properties:
      path:
        type: string
      weight:
        description: 'valid range: 10–1000'
        type: integer
    type: object
  sablier.DockerContainerInfo:
    properties:
      id:
        type: string
      image:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
    type: object
  sablier.InstanceInfo:
    properties:
      antiAffinity:
        description: |-
          AntiAffinity lists the groups this instance backs off from. Whenever any
          listed group has an active session, Sablier forces this instance to its
          idle state (stopped, or idle resources in scale mode) and restores it once
          none of the listed groups are active anymore. Parsed from the
          sablier.anti-affinity label (comma-separated group names).
        items:
          type: string
        type: array
      currentReplicas:
        type: integer
      desiredReplicas:
        type: integer
      docker:
        $ref: '#/definitions/sablier.DockerContainerInfo'
      enabled:
        type: string
      groups:
        items:
          type: string
        type: array
      kubernetes:
        $ref: '#/definitions/sablier.KubernetesWorkloadInfo'
      message:
        type: string
      name:
        type: string
      podman:
        $ref: '#/definitions/sablier.PodmanContainerInfo'
      provider:
        $ref: '#/definitions/sablier.ProviderType'
      readyAfter:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: |-
          ReadyAfter is the minimum duration to wait after the instance first
          reports ready before Sablier considers it truly ready. Set via the
          sablier.ready-after label (e.g. "30s"). Zero means no extra wait.
      readyAt:
        description: |-
          ReadyAt records when the instance first transitioned to InstanceStatusReady.
          It is set internally by Sablier and is never populated by a provider.
        type: string
      readyOnStart:
        description: |-
          ReadyOnStart indicates the instance should be considered ready as soon as
          the start is dispatched, without waiting for health.
          Controlled by the sablier.ready-on-start Label
        type: boolean
      runningDays:
        description: |-
          RunningDays restricts the RunningHours window to specific weekdays,
          parsed from the sablier.running-days label (e.g. "Mon,Tue,Wed,Thu,Fri").
          Empty means the window applies every day.
        type: string
      runningHours:
        description: |-
          RunningHours is a daily keep-warm window in local time, parsed from
          the sablier.running-hours label (format: HH:MM-HH:MM).
        type: string
      scaleConfig:
        allOf:
        - $ref: '#/definitions/sablier.ScaleConfig'
        description: |-
          ScaleConfig configures resource-based scale mode for this instance.
          When present, Sablier throttles CPU/memory instead of stopping the container.
      status:
        $ref: '#/definitions/sablier.InstanceStatus'
      swarm:
        $ref: '#/definitions/sablier.SwarmServiceInfo'
    type: object
  sablier.InstanceInfoWithError:
    properties:
      error: {}
      instance:
        $ref: '#/definitions/sablier.InstanceInfo'
    type: object
  sablier.InstanceStatus:
    enum:
    - stopped
    - starting
    - ready
    - error
    - completed
    - not-ready
    type: string
    x-enum-varnames:
    - InstanceStatusStopped
    - InstanceStatusStarting
    - InstanceStatusReady
    - InstanceStatusError
    - InstanceStatusCompleted
    - InstanceStatusNotReady
  sablier.KubernetesWorkloadInfo:
    properties:
      image:
        type: string
      kind:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      namespace:
        type: string
    type: object
  sablier.PodmanContainerInfo:
    properties:
      id:
        type: string
      image:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
    type: object
  sablier.ProviderType:
    enum:
    - docker
    - swarm
    - kubernetes
    - podman
    type: string
    x-enum-varnames:
    - ProviderDocker
    - ProviderSwarm
    - ProviderKubernetes
    - ProviderPodman
  sablier.ResourceProfile:
    properties:
      blkioDeviceReadBps:
        description: |-
          BlkioDeviceReadBps limits the read throughput per block device (bytes/s).
          Rate values use human-readable suffixes, e.g. "10m" = 10 MB/s.
        items:
          $ref: '#/definitions/sablier.BlkioThrottleDevice'
        type: array
      blkioDeviceReadIOps:
        description: |-
          BlkioDeviceReadIOps limits the read IOPS per block device.
          Rate values are plain integers, e.g. "100".
        items:
          $ref: '#/definitions/sablier.BlkioThrottleDevice'
        type: array
      blkioDeviceWriteBps:
        description: BlkioDeviceWriteBps limits the write throughput per block device
          (bytes/s).
        items:
          $ref: '#/definitions/sablier.BlkioThrottleDevice'
        type: array
      blkioDeviceWriteIOps:
        description: BlkioDeviceWriteIOps limits the write IOPS per block device.
        items:
          $ref: '#/definitions/sablier.BlkioThrottleDevice'
        type: array
      blkioWeight:
        description: |-
          BlkioWeight is the relative block I/O scheduling weight (10–1000).
          0 means unset (use the container's current or default weight).
          Supported on Docker and Podman; ignored on Docker Swarm and Kubernetes.
        type: integer
      blkioWeightDevice:
        description: BlkioWeightDevice overrides the I/O scheduling weight per block
          device.
        items:
          $ref: '#/definitions/sablier.BlkioWeightDevice'
        type: array
      cpu:
        description: CPU is the CPU limit (e.g. "0.5" for Docker/Swarm, "500m" for
          Kubernetes).
        type: string
      memory:
        description: Memory is the memory limit (e.g. "128m" for Docker/Swarm, "128Mi"
          for Kubernetes).
        type: string
      replicas:
        description: |-
          Replicas is the desired replica count for this profile.
          For idle: 0 (default) stops the workload; ≥ 1 keeps it running with
          throttled resources (resource scaling mode).
          For active: defaults to 1.
        type: integer
    type: object
  sablier.ScaleConfig:
    properties:
      active:
        $ref: '#/definitions/sablier.ResourceProfile'
      idle:
        $ref: '#/definitions/sablier.ResourceProfile'
    type: object
  sablier.SessionState:
    properties:
      instances:
        additionalProperties:
          $ref: '#/definitions/sablier.InstanceInfoWithError'
        type: object
    type: object
  sablier.SwarmServiceInfo:
    properties:
      id:
        type: string
      image:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
    type: object
  time.Duration:
    enum:
    - -9223372036854775808
    - 9223372036854775807
    - 1
    - 1000
    - 1000000
    - 1000000000
    - 60000000000
    - 3600000000000
    format: int64
    type: integer
    x-enum-varnames:
    - minDuration
    - maxDuration
    - Nanosecond
    - Microsecond
    - Millisecond
    - Second
    - Minute
    - Hour
  url.URL:
    properties:
      forceQuery:
        description: |-
          ForceQuery indicates whether the original URL contained a query ('?') character.
          When set, the String method will include a trailing '?', even when RawQuery is empty.
        type: boolean
      fragment:
        description: fragment for references (without '#')
        type: string
      host:
        description: '"host" or "host:port" (see Hostname and Port methods)'
        type: string
      omitHost:
        description: |-
          OmitHost indicates the URL has an empty host (authority).
          When set, the String method will not include the host when it is empty.
        type: boolean
      opaque:
        description: encoded opaque data
        type: string
      path:
        description: path (relative paths may omit leading slash)
        type: string
      rawFragment:
        description: |-
          RawFragment is an optional field containing an encoded fragment hint.
          See the EscapedFragment method for more details.

          In general, code should call EscapedFragment instead of reading RawFragment.
        type: string
      rawPath:
        description: |-
          RawPath is an optional field containing an encoded path hint.
          See the EscapedPath method for more details.

          In general, code should call EscapedPath instead of reading RawPath.
        type: string
      rawQuery:
        description: |-
          RawQuery contains the encoded query values, without the initial '?'.
          Use URL.Query to decode the query.
        type: string
      scheme:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/url.Userinfo'
        description: username and password information
    type: object
  url.Userinfo:
    type: object
externalDocs:
  description: Documentation
  url: https://sablierapp.dev/
info:
  contact:
    name: Sablier
    url: https://github.com/sablierapp/sablier
  description: |-
    The Sablier HTTP API. Reverse-proxy integrations call these endpoints to start instances on demand and check session readiness.
    The two strategy endpoints are the heart of Sablier: `dynamic` serves a themed waiting page that self-refreshes, while `blocking` holds the request until the session is ready.
  license:
    name: AGPL-3.0
    url: https://github.com/sablierapp/sablier/blob/main/LICENSE
  title: Sablier API
  version: "1.0"
paths:
  /api/events:
    get:
      description: 'Server-Sent Events stream of instance lifecycle events. Each event
        is `event: <type>` followed by `data: <InstanceInfo JSON>`. The stream stays
        open until the client disconnects.'
      parameters:
      - collectionFormat: csv
        description: Event types to include (created, updated, removed, started, stopped).
          Repeat for multiple.
        in: query
        items:
          type: string
        name: types
        type: array
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream (text/event-stream)
          schema:
            type: string
      summary: Instance events (SSE)
      tags:
      - events
  /api/strategies/blocking:
    get:
      description: Holds the request until the requested instances are ready, or until
        the timeout elapses. Provide either `names` (one or more) or `group`, never
        both.
      parameters:
      - collectionFormat: csv
        description: Instance name(s); repeat for multiple. Mutually exclusive with
          group.
        in: query
        items:
          type: string
        name: names
        type: array
      - description: Group name. Mutually exclusive with names.
        in: query
        name: group
        type: string
      - description: Session duration as a Go duration (e.g. 5m). Defaults to the
          server default.
        in: query
        name: session_duration
        type: string
      - description: Maximum time to wait as a Go duration (e.g. 1m).
        in: query
        name: timeout
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            X-Sablier-Session-Status:
              description: ready or not-ready
              type: string
          schema:
            $ref: '#/definitions/api.SessionResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/rfc7807.Problem'
        "404":
          description: Group or instance not found
          schema:
            $ref: '#/definitions/rfc7807.Problem'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/rfc7807.Problem'
        "504":
          description: Session was not ready before the timeout
          schema:
            $ref: '#/definitions/rfc7807.Problem'
      summary: Blocking strategy
      tags:
      - strategies
  /api/strategies/dynamic:
    get:
      description: Returns a themed HTML waiting page reflecting the session status;
        the page self-refreshes until the instances are ready. Provide either `names`
        or `group`.
      parameters:
      - collectionFormat: csv
        description: Instance name(s). Mutually exclusive with group.
        in: query
        items:
          type: string
        name: names
        type: array
      - description: Group name. Mutually exclusive with names.
        in: query
        name: group
        type: string
      - description: Session duration as a Go duration (e.g. 5m).
        in: query
        name: session_duration
        type: string
      - description: Waiting-page refresh interval as a Go duration (e.g. 5s).
        in: query
        name: refresh_frequency
        type: string
      - description: Show per-instance details on the waiting page.
        in: query
        name: show_details
        type: boolean
      - description: Display name shown on the waiting page.
        in: query
        name: display_name
        type: string
      - description: Theme name for the waiting page.
        in: query
        name: theme
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML waiting page
          headers:
            X-Sablier-Session-Status:
              description: ready or not-ready
              type: string
          schema:
            type: string
        "404":
          description: Group or theme not found
          schema:
            $ref: '#/definitions/rfc7807.Problem'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/rfc7807.Problem'
      summary: Dynamic strategy
      tags:
      - strategies
  /api/themes:
    get:
      description: Lists the waiting-page themes available to the dynamic strategy
        (built-in and custom). Also served at the legacy path `/api/dynamic/themes`.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ThemesResponse'
      summary: List themes
      tags:
      - themes
  /health:
    get:
      description: Liveness endpoint. Returns 200 while serving and 503 while the
        server is terminating.
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "503":
          description: Service Unavailable
          schema:
            type: string
      summary: Health check
      tags:
      - system
swagger: "2.0"
